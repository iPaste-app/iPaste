name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Release ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            args: ""
          - name: macOS Apple Silicon
            platform: macos-15
            rustTargets: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - name: macOS Intel
            platform: macos-15-intel
            rustTargets: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure updater endpoints
        env:
          IPASTE_UPDATER_R2_ENDPOINT: ${{ secrets.IPASTE_UPDATER_R2_ENDPOINT }}
          IPASTE_OCR_R2_BASE_URL: ${{ secrets.IPASTE_OCR_R2_BASE_URL }}
        run: node scripts/configure-updater-endpoints.mjs

      - name: Build and publish Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          releaseCommitish: main
          tagName: iPaste-v__VERSION__
          releaseName: iPaste v__VERSION__
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          retryAttempts: 2
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Verify macOS updater artifacts
        if: startsWith(matrix.name, 'macOS')
        shell: bash
        run: |
          artifact_paths='${{ steps.tauri-build.outputs.artifactPaths }}'
          echo "$artifact_paths" | jq -e 'any(.[]; test("\\.app\\.tar\\.gz\\.sig$"))' >/dev/null

  mirror-r2:
    name: Mirror release to Cloudflare R2
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    env:
      IPASTE_UPDATER_R2_ENDPOINT: ${{ secrets.IPASTE_UPDATER_R2_ENDPOINT }}

    steps:
      - name: Checkout
        if: env.IPASTE_UPDATER_R2_ENDPOINT != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.IPASTE_UPDATER_R2_ENDPOINT != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release tag
        if: env.IPASTE_UPDATER_R2_ENDPOINT != ''
        id: release-tag
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "tag=iPaste-v${version}" >> "$GITHUB_OUTPUT"

      - name: Download GitHub release assets
        if: env.IPASTE_UPDATER_R2_ENDPOINT != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/r2-release
          gh release download "${{ steps.release-tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir dist/r2-release \
            --clobber

      - name: Upload updater assets to R2
        if: env.IPASTE_UPDATER_R2_ENDPOINT != ''
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_KEEP_RELEASES: 3
        run: node scripts/mirror-r2-release.mjs
